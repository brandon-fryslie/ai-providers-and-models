name: Update OpenAI Models

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9am UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  update-models:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run model updater
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/update_openai_models.py

      - name: Commit and push if changed
        run: |
          git diff --quiet models.yaml && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models.yaml
          git commit -m "chore: update OpenAI models from API"
          git push

      - name: Convert YAML to JSON
        run: python -c "
          from ruamel.yaml import YAML
          import json, pathlib
          yml = YAML()
          data = yml.load(pathlib.Path('models.yaml'))
          def to_plain(obj):
              if hasattr(obj, 'items'):
                  return {str(k): to_plain(v) for k, v in obj.items()}
              if isinstance(obj, list):
                  return [to_plain(i) for i in obj]
              return obj
          pathlib.Path('_site').mkdir(exist_ok=True)
          pathlib.Path('_site/models.json').write_text(json.dumps(to_plain(data), indent=2))
          "

      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-pages:
    needs: update-models
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
