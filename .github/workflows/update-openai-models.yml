name: Update Models

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9am UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  update-models:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Update OpenAI models
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/update_openai_models.py

      - name: Update Gemini models
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/update_gemini_models.py

      - name: Update Anthropic models
        run: python scripts/update_anthropic_models.py

      - name: Validate schema
        run: python modules/validate-schema/validate.py models.yaml modules/models-schema.yaml

      - name: Commit and push if changed
        run: |
          git diff --quiet models.yaml && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models.yaml
          git commit -m "chore: update models from APIs"
          git push

      - name: Convert YAML to JSON
        run: python scripts/yaml_to_json.py models.yaml _site/models.json

      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-pages:
    needs: update-models
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
